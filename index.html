<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>Vehicle Management System | Mobile & Desktop Friendly</title>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 12px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Responsive Header */
        .header {
            background: white;
            padding: 15px 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        @media (min-width: 768px) {
            .header {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
                padding: 20px 30px;
            }
        }

        .header h1 {
            color: #333;
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        @media (min-width: 768px) {
            .header h1 {
                font-size: 28px;
            }
        }

        .header h1 i {
            color: #667eea;
        }

        .status-badge {
            background: #48bb78;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            width: fit-content;
        }

        /* Main Grid Layout - Responsive */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (min-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        /* Form Sections */
        .form-section {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        @media (min-width: 768px) {
            .form-section {
                padding: 25px;
            }
        }

        .section-title {
            color: #333;
            font-size: 18px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        @media (min-width: 768px) {
            .section-title {
                font-size: 20px;
            }
        }

        .section-title i {
            color: #667eea;
        }

        /* Form Grid - Responsive */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        @media (min-width: 640px) {
            .form-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .form-group {
            margin-bottom: 10px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #555;
            font-weight: 500;
            font-size: 13px;
        }

        @media (min-width: 768px) {
            .form-group label {
                font-size: 14px;
            }
        }

        .form-group label i {
            color: #667eea;
            width: 20px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
            -webkit-appearance: none;
            appearance: none;
        }

        @media (min-width: 768px) {
            .form-group input,
            .form-group textarea,
            .form-group select {
                padding: 12px 15px;
            }
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        /* Action Buttons - Responsive */
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }

        @media (min-width: 640px) {
            .action-buttons {
                flex-direction: row;
            }
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
            width: 100%;
        }

        @media (min-width: 640px) {
            .btn {
                padding: 15px 30px;
                font-size: 16px;
            }
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #48bb78;
            color: white;
        }

        .btn-secondary:hover {
            background: #38a169;
            transform: translateY(-2px);
        }

        /* Preview Section */
        .preview-section {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            border-left: 4px solid #fbbf24;
        }

        .preview-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            color: #d97706;
        }

        .preview-header i {
            font-size: 20px;
        }

        .preview-header h3 {
            font-size: 18px;
            font-weight: 600;
        }

        .preview-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        @media (min-width: 768px) {
            .preview-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .preview-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
        }

        .preview-card h4 {
            color: #667eea;
            font-size: 16px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .preview-item {
            margin-bottom: 6px;
            font-size: 13px;
        }

        .preview-item strong {
            color: #555;
            display: inline-block;
            min-width: 70px;
        }

        /* Search Section - Responsive */
        .search-section {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .search-box {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        @media (min-width: 768px) {
            .search-box {
                flex-direction: row;
                align-items: flex-end;
            }
        }

        .search-box .form-group {
            flex: 1;
            margin-bottom: 0;
        }

        .btn-search {
            background: #4299e1;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .btn-search:hover {
            background: #3182ce;
            transform: translateY(-2px);
        }

        @media (min-width: 768px) {
            .btn-search {
                padding: 12px 30px;
                width: auto;
            }
        }

        /* Table - Responsive */
        .saved-data-section {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .table-container {
            overflow-x: auto;
            margin-top: 15px;
            -webkit-overflow-scrolling: touch;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }

        th {
            background: #667eea;
            color: white;
            padding: 12px;
            text-align: left;
            font-weight: 500;
            font-size: 13px;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
            color: #555;
            font-size: 13px;
        }

        @media (min-width: 768px) {
            th, td {
                padding: 15px;
                font-size: 14px;
            }
        }

        .view-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.3s ease;
            width: 100%;
        }

        @media (min-width: 768px) {
            .view-btn {
                padding: 8px 15px;
                font-size: 12px;
                width: auto;
            }
        }

        /* Modal - Mobile Friendly */
        .modal-container {
            width: 95%;
            margin: 10px;
            max-height: 85vh;
        }

        @media (min-width: 768px) {
            .modal-container {
                width: 90%;
                max-width: 800px;
            }
        }

        .modal-header {
            padding: 15px 20px;
        }

        .modal-header h2 {
            font-size: 20px;
        }

        .modal-body {
            padding: 20px;
        }

        .detail-grid {
            grid-template-columns: 1fr;
        }

        @media (min-width: 640px) {
            .detail-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Toast - Mobile Friendly */
        .toast {
            min-width: 280px;
            max-width: 90vw;
            padding: 12px 16px;
            font-size: 13px;
        }

        /* All other existing styles remain the same */
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .toast-container {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 9999;
        }

        .toast {
            background: white;
            color: #333;
            padding: 12px 16px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            transform: translateX(400px);
            animation: slideIn 0.3s ease forwards;
            border-left: 4px solid;
        }

        .toast.success { border-left-color: #48bb78; }
        .toast.error { border-left-color: #f56565; }
        .toast.info { border-left-color: #4299e1; }
        .toast.warning { border-left-color: #ecc94b; }

        .toast i { font-size: 18px; }
        .toast.success i { color: #48bb78; }
        .toast.error i { color: #f56565; }
        .toast.info i { color: #4299e1; }
        .toast.warning i { color: #ecc94b; }

        .toast-message {
            flex: 1;
            font-size: 13px;
            font-weight: 500;
        }

        .toast-close {
            color: #999;
            cursor: pointer;
            font-size: 12px;
        }

        @keyframes slideIn {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes slideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(400px); opacity: 0; }
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            backdrop-filter: blur(5px);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes modalSlideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-close {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.3s;
        }

        .detail-section {
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 12px;
            border-left: 4px solid #667eea;
        }

        .detail-section h3 {
            color: #333;
            font-size: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .detail-item {
            margin-bottom: 8px;
        }

        .detail-label {
            color: #666;
            font-size: 11px;
            margin-bottom: 2px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .detail-value {
            color: #333;
            font-size: 14px;
            font-weight: 500;
            word-break: break-word;
        }

        .vehicle-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
            margin-right: 6px;
            margin-bottom: 6px;
        }

        .badge-primary { background: #667eea20; color: #667eea; }
        .badge-success { background: #48bb7820; color: #38a169; }
        .badge-warning { background: #ecc94b20; color: #d69e2e; }

        .modal-footer {
            padding: 15px 20px;
            background: #f8f9fa;
            border-radius: 0 0 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        @media (min-width: 640px) {
            .modal-footer {
                flex-direction: row;
                justify-content: flex-end;
            }
        }

        .modal-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
            justify-content: center;
        }

        .modal-btn-primary {
            background: #667eea;
            color: white;
        }

        .modal-btn-secondary {
            background: #e2e8f0;
            color: #4a5568;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>
                <i class="fas fa-car"></i>
                Vehicle Management
            </h1>
            <div class="status-badge">
                <i class="fas fa-circle"></i>
                Firebase Connected
            </div>
        </div>

        <!-- Main Content Grid -->
        <div class="main-grid">
            <!-- Left Column - Seller & Buyer -->
            <div>
                <!-- Seller Details -->
                <div class="form-section">
                    <h2 class="section-title">
                        <i class="fas fa-user-tie"></i>
                        Seller Details
                    </h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label><i class="fas fa-user"></i> Full Name *</label>
                            <input type="text" id="sellerName" placeholder="Enter seller's full name">
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-map-marker-alt"></i> Address *</label>
                            <input type="text" id="sellerAddress" placeholder="Enter seller's address">
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-phone"></i> Contact Number *</label>
                            <input type="tel" id="sellerContact" placeholder="Enter contact number">
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-id-card"></i> ID Number *</label>
                            <input type="text" id="sellerId" placeholder="Enter ID / NIC number">
                        </div>
                    </div>
                </div>

                <!-- Buyer Details -->
                <div class="form-section">
                    <h2 class="section-title">
                        <i class="fas fa-user-check"></i>
                        Buyer Details
                    </h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label><i class="fas fa-user"></i> Full Name *</label>
                            <input type="text" id="buyerName" placeholder="Enter buyer's full name">
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-map-marker-alt"></i> Address *</label>
                            <input type="text" id="buyerAddress" placeholder="Enter buyer's address">
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-phone"></i> Contact Number *</label>
                            <input type="tel" id="buyerContact" placeholder="Enter contact number">
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-id-card"></i> ID Number *</label>
                            <input type="text" id="buyerId" placeholder="Enter ID / NIC number">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Column - Vehicle Details -->
            <div>
                <!-- Vehicle Details -->
                <div class="form-section">
                    <h2 class="section-title">
                        <i class="fas fa-truck"></i>
                        Vehicle Details
                    </h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label><i class="fas fa-hashtag"></i> Vehicle Number *</label>
                            <input type="text" id="vehicleNumber" placeholder="e.g., WP ABC-1234">
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-calendar"></i> Manufacture Year *</label>
                            <input type="number" id="vehicleYear" placeholder="e.g., 2020" min="1900" max="2026">
                        </div>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-align-left"></i> Description *</label>
                        <textarea id="vehicleDescription" placeholder="Enter vehicle description, features, condition, etc..."></textarea>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-tag"></i> Vehicle Price *</label>
                        <input type="text" id="vehiclePrice" placeholder="e.g., Rs. 5,500,000">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-palette"></i> Vehicle Color</label>
                        <input type="text" id="vehicleColor" placeholder="e.g., White, Black, Silver">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-gas-pump"></i> Fuel Type</label>
                        <select id="vehicleFuel">
                            <option value="">Select Fuel Type</option>
                            <option value="Petrol">Petrol</option>
                            <option value="Diesel">Diesel</option>
                            <option value="Hybrid">Hybrid</option>
                            <option value="Electric">Electric</option>
                            <option value="LPG">LPG</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-cogs"></i> Transmission</label>
                        <select id="vehicleTransmission">
                            <option value="">Select Transmission</option>
                            <option value="Automatic">Automatic</option>
                            <option value="Manual">Manual</option>
                            <option value="Tiptronic">Tiptronic</option>
                        </select>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="action-buttons">
                    <button class="btn btn-primary" onclick="saveVehicleData()">
                        <i class="fas fa-save"></i>
                        Save Vehicle Data
                    </button>
                    <button class="btn btn-secondary" onclick="loadAllVehicles()">
                        <i class="fas fa-history"></i>
                        View All Data
                    </button>
                </div>
            </div>
        </div>

        <!-- Preview Section -->
        <div class="preview-section" id="previewSection" style="display: none;">
            <div class="preview-header">
                <i class="fas fa-eye"></i>
                <h3>Last Saved Vehicle Preview</h3>
            </div>
            <div class="preview-grid" id="previewContent">
                <!-- Preview content will be loaded here temporarily -->
            </div>
        </div>

        <!-- Search Section -->
        <div class="search-section">
            <h2 class="section-title">
                <i class="fas fa-search"></i>
                Search Saved Data
            </h2>
            <div class="search-box">
                <div class="form-group">
                    <label><i class="fas fa-hashtag"></i> Search by Vehicle Number</label>
                    <input type="text" id="searchVehicleNumber" placeholder="Enter vehicle number to search">
                </div>
                <button class="btn-search" onclick="searchByVehicleNumber()">
                    <i class="fas fa-search"></i>
                    Search
                </button>
                <button class="btn-search" style="background: #805ad5;" onclick="clearSearch()">
                    <i class="fas fa-times"></i>
                    Clear
                </button>
            </div>
        </div>

        <!-- Saved Data Table -->
        <div class="saved-data-section">
            <h2 class="section-title">
                <i class="fas fa-database"></i>
                Saved Vehicle Records
            </h2>
            <div class="table-container">
                <table id="dataTable">
                    <thead>
                        <tr>
                            <th>Vehicle No</th>
                            <th>Seller</th>
                            <th>Buyer</th>
                            <th>Year</th>
                            <th>Price</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr>
                            <td colspan="6" style="text-align: center; padding: 30px;">
                                <i class="fas fa-database" style="font-size: 40px; color: #ccc; margin-bottom: 10px; display: block;"></i>
                                No data available. Click "View All Data" to load records.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Modal Overlay -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal-container" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2>
                    <i class="fas fa-car"></i>
                    Vehicle Details
                </h2>
                <button class="modal-close" onclick="closeModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Dynamic content will be loaded here -->
            </div>
            <div class="modal-footer">
                <button class="modal-btn modal-btn-secondary" onclick="closeModal()">
                    <i class="fas fa-times"></i>
                    Close
                </button>
                <button class="modal-btn modal-btn-primary" onclick="printDetails()">
                    <i class="fas fa-print"></i>
                    Print
                </button>
            </div>
        </div>
    </div>

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <script>
        // Firebase Configuration
        const firebaseConfig = {

        // Toast Notification System
        function showToast(message, type = 'info', duration = 3000) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            const icons = {
                success: 'fa-check-circle',
                error: 'fa-exclamation-circle',
                warning: 'fa-exclamation-triangle',
                info: 'fa-info-circle'
            };
            
            toast.innerHTML = `
                <i class="fas ${icons[type]}"></i>
                <span class="toast-message">${message}</span>
                <span class="toast-close" onclick="this.parentElement.remove()">
                    <i class="fas fa-times"></i>
                </span>
            `;
            
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'slideOut 0.3s ease forwards';
                setTimeout(() => {
                    if (toast.parentElement) {
                        toast.remove();
                    }
                }, 300);
            }, duration);
        }

        // Modal Functions
        function openModal() {
            document.getElementById('modalOverlay').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeModal(event) {
            if (event && event.target === document.getElementById('modalOverlay')) {
                document.getElementById('modalOverlay').style.display = 'none';
                document.body.style.overflow = 'auto';
            } else if (!event) {
                document.getElementById('modalOverlay').style.display = 'none';
                document.body.style.overflow = 'auto';
            }
        }

        function printDetails() {
            const modalBody = document.getElementById('modalBody').innerHTML;
            const printWindow = window.open('', '_blank');
            printWindow.document.write(`

                    <head>
                        <title>Vehicle Details</title>
                        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
                        <style>
                            body { font-family: 'Segoe UI', sans-serif; padding: 20px; }
                            @media print { 
                                .no-print { display: none; }
                                body { padding: 10px; }
                            }
                        </style>
                    </head>
                    <body>
                        ${modalBody}
                    </body>
                </html>
            `);
            printWindow.document.close();
            printWindow.print();
        }

        // Save vehicle data
        async function saveVehicleData() {
            // Get form values
            const vehicleNumber = document.getElementById('vehicleNumber').value;
            const sellerName = document.getElementById('sellerName').value;
            const sellerAddress = document.getElementById('sellerAddress').value;
            const sellerContact = document.getElementById('sellerContact').value;
            const sellerId = document.getElementById('sellerId').value;
            const buyerName = document.getElementById('buyerName').value;
            const buyerAddress = document.getElementById('buyerAddress').value;
            const buyerContact = document.getElementById('buyerContact').value;
            const buyerId = document.getElementById('buyerId').value;
            const vehicleYear = document.getElementById('vehicleYear').value;
            const vehicleDescription = document.getElementById('vehicleDescription').value;
            const vehiclePrice = document.getElementById('vehiclePrice').value;
            const vehicleColor = document.getElementById('vehicleColor').value;
            const vehicleFuel = document.getElementById('vehicleFuel').value;
            const vehicleTransmission = document.getElementById('vehicleTransmission').value;

            // Validate required fields
            if (!vehicleNumber || !sellerName || !sellerAddress || !sellerContact || !sellerId || 
                !buyerName || !buyerAddress || !buyerContact || !buyerId || !vehicleYear || 
                !vehicleDescription || !vehiclePrice) {
                showToast('Please fill all required fields', 'error');
                return;
            }

            try {
                showToast('Saving vehicle data...', 'info', 2000);

                // Create data object
                const vehicleData = {
                    vehicleNumber,
                    seller: {
                        name: sellerName,
                        address: sellerAddress,
                        contact: sellerContact,
                        id: sellerId
                    },
                    buyer: {
                        name: buyerName,
                        address: buyerAddress,
                        contact: buyerContact,
                        id: buyerId
                    },
                    vehicleDetails: {
                        year: vehicleYear,
                        description: vehicleDescription,
                        price: vehiclePrice,
                        color: vehicleColor || 'Not specified',
                        fuelType: vehicleFuel || 'Not specified',
                        transmission: vehicleTransmission || 'Not specified'
                    },
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                };

                // Save to Firebase
                await db.collection('vehicles').doc(vehicleNumber).set(vehicleData);

                // Show Preview (temporary - will disappear on reload)
                showPreview(vehicleData);

                showToast('✅ Vehicle data saved successfully!', 'success');
                
                // Clear form
                clearForm();
                
                // Reload data
                loadAllVehicles();

            } catch (error) {
                console.error('Error saving data: ', error);
                showToast('❌ Error saving data: ' + error.message, 'error');
            }
        }

        // Show preview function - only shows after save, disappears on reload
        function showPreview(data) {
            const previewSection = document.getElementById('previewSection');
            const previewContent = document.getElementById('previewContent');
            
            previewContent.innerHTML = `
                <div class="preview-card">
                    <h4><i class="fas fa-user-tie"></i> Seller</h4>
                    <div class="preview-item"><strong>Name:</strong> ${data.seller.name}</div>
                    <div class="preview-item"><strong>Contact:</strong> ${data.seller.contact}</div>
                </div>
                <div class="preview-card">
                    <h4><i class="fas fa-user-check"></i> Buyer</h4>
                    <div class="preview-item"><strong>Name:</strong> ${data.buyer.name}</div>
                    <div class="preview-item"><strong>Contact:</strong> ${data.buyer.contact}</div>
                </div>
                <div class="preview-card">
                    <h4><i class="fas fa-truck"></i> Vehicle</h4>
                    <div class="preview-item"><strong>Number:</strong> ${data.vehicleNumber}</div>
                    <div class="preview-item"><strong>Price:</strong> ${data.vehicleDetails.price}</div>

            previewSection.style.display = 'block';
            
            // Auto hide preview after 10 seconds
            setTimeout(() => {

        // Load all vehicles
        async function loadAllVehicles() {
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '<tr><td colspan="6"><div class="spinner"></div><p style="text-align: center;">Loading data...</p></td></tr>';

            try {
                const snapshot = await db.collection('vehicles').orderBy('createdAt', 'desc').get();
                
                if (snapshot.empty) {
                    tableBody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 30px;"><i class="fas fa-database" style="font-size: 40px; color: #ccc; margin-bottom: 10px; display: block;"></i>No records found</td></tr>';
                    showToast('No vehicle records found', 'info');
                    return;
                }

                displayVehicles(snapshot);
                showToast(`📊 Loaded ${snapshot.size} vehicle records`, 'success');

            } catch (error) {
                console.error('Error loading data: ', error);
                tableBody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: #f56565; padding: 30px;"><i class="fas fa-exclamation-triangle" style="font-size: 40px; margin-bottom: 10px; display: block;"></i>Error loading data</td></tr>';
                showToast('Error loading data: ' + error.message, 'error');
            }
        }

        // Display vehicles in table
        function displayVehicles(snapshot) {
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '';

            snapshot.forEach(doc => {
                const data = doc.data();
                const row = `
                    <tr>
                        <td><strong>${data.vehicleNumber}</strong></td>
                        <td>
                            <i class="fas fa-user"></i> ${data.seller.name}<br>
                            <small><i class="fas fa-phone"></i> ${data.seller.contact}</small>
                        </td>
                        <td>
                            <i class="fas fa-user"></i> ${data.buyer.name}<br>
                            <small><i class="fas fa-phone"></i> ${data.buyer.contact}</small>
                        </td>
                        <td>${data.vehicleDetails.year}</td>
                        <td>${data.vehicleDetails.price}</td>
                        <td>
                            <button class="view-btn" onclick="viewFullDetails('${doc.id}')">
                                <i class="fas fa-eye"></i> View
                            </button>
                        </td>
                    </tr>
                `;
                tableBody.innerHTML += row;
            });
        }

        // Search by vehicle number
        async function searchByVehicleNumber() {
            const searchNumber = document.getElementById('searchVehicleNumber').value;
            
            if (!searchNumber) {
                showToast('Please enter a vehicle number', 'error');
                return;
            }

            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '<tr><td colspan="6"><div class="spinner"></div><p style="text-align: center;">Searching...</p></td></tr>';

            try {
                const doc = await db.collection('vehicles').doc(searchNumber).get();
                
                if (!doc.exists) {
                    tableBody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 30px;"><i class="fas fa-search" style="font-size: 40px; color: #ccc; margin-bottom: 10px; display: block;"></i>No vehicle found with number: ' + searchNumber + '</td></tr>';
                    showToast('No vehicle found with number: ' + searchNumber, 'warning');
                    return;
                }

                const fakeSnapshot = {
                    forEach: (callback) => {
                        callback(doc);
                    }
                };
                
                displayVehicles(fakeSnapshot);
                showToast('Vehicle found!', 'success');

            } catch (error) {
                console.error('Error searching: ', error);
                showToast('Error searching: ' + error.message, 'error');
            }
        }

        // Clear search and show all
        function clearSearch() {
            document.getElementById('searchVehicleNumber').value = '';
            loadAllVehicles();
            showToast('Search cleared', 'info');
        }

        // Clear form
        function clearForm() {
            document.getElementById('sellerName').value = '';
            document.getElementById('sellerAddress').value = '';
            document.getElementById('sellerContact').value = '';
            document.getElementById('sellerId').value = '';
            document.getElementById('buyerName').value = '';
            document.getElementById('buyerAddress').value = '';
            document.getElementById('buyerContact').value = '';
            document.getElementById('buyerId').value = '';
            document.getElementById('vehicleNumber').value = '';
            document.getElementById('vehicleYear').value = '';
            document.getElementById('vehicleDescription').value = '';
            document.getElementById('vehiclePrice').value = '';
            document.getElementById('vehicleColor').value = '';
            document.getElementById('vehicleFuel').value = '';
            document.getElementById('vehicleTransmission').value = '';
        }

        // Initialize on load - Preview section hidden by default
        window.onload = function() {
            loadAllVehicles();
            // Preview section starts hidden
            document.getElementById('previewSection').style.display = 'none';
            showToast('🚀 System Ready! Welcome', 'info', 3000);
        };

        // Close modal with Escape key
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                closeModal();
            }
        });
    </script>

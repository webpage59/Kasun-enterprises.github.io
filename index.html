<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>Vehicle Management · Smart Search</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #1e2b4f 0%, #2d1b44 100%);
            min-height: 100vh;
            padding: 16px 12px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* header */
        .header {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(4px);
            padding: 16px 22px;
            border-radius: 28px;
            box-shadow: 0 20px 35px -8px rgba(0,0,0,0.3);
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border: 1px solid rgba(255,255,255,0.3);
        }

        @media (min-width: 600px) {
            .header {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
                padding: 18px 30px;
            }
        }

        .header h1 {
            color: #0a1a2f;
            font-weight: 650;
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: -0.3px;
        }

        .header h1 i {
            color: #3f5efb;
            background: #eef2ff;
            padding: 8px;
            border-radius: 18px;
        }

        .status-badge {
            background: #0fba6d;
            color: white;
            padding: 8px 22px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            width: fit-content;
            box-shadow: 0 6px 14px rgba(15,186,109,0.3);
        }

        /* main grid */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 22px;
            margin-bottom: 25px;
        }

        @media (min-width: 1100px) {
            .main-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        /* cards */
        .form-section {
            background: white;
            border-radius: 28px;
            padding: 20px 18px;
            box-shadow: 0 20px 35px -5px rgba(0,0,0,0.25);
            border: 1px solid #ffffff70;
            transition: 0.2s;
        }

        @media (min-width: 680px) {
            .form-section {
                padding: 26px;
            }
        }

        .section-title {
            color: #1e293b;
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 18px;
            padding-bottom: 10px;
            border-bottom: 3px solid #e9ecf5;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title i {
            color: #3f5efb;
            background: #eef1ff;
            padding: 7px;
            border-radius: 14px;
        }

        /* forms */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 18px;
        }

        @media (min-width: 540px) {
            .form-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .form-group {
            margin-bottom: 5px;
        }

        .form-group label {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 6px;
            color: #2d3a4f;
            font-weight: 550;
            font-size: 0.9rem;
        }

        .form-group label i {
            color: #3f5efb;
            width: 20px;
            font-size: 1rem;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #dee4ee;
            border-radius: 20px;
            font-size: 0.95rem;
            background: #fafcff;
            transition: 0.2s;
            -webkit-appearance: none;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            border-color: #3f5efb;
            outline: none;
            box-shadow: 0 0 0 4px rgba(63,94,251,0.15);
            background: white;
        }

        .form-group textarea {
            min-height: 95px;
            resize: vertical;
        }

        /* action buttons */
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 10px;
        }

        @media (min-width: 540px) {
            .action-buttons {
                flex-direction: row;
            }
        }

        .btn {
            padding: 16px 18px;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            transition: 0.2s;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-primary {
            background: linear-gradient(115deg, #3f5efb, #8c4ef0);
            color: white;
            box-shadow: 0 8px 18px #3f5efb60;
        }

        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 12px 24px #3f5efbaa;
        }

        .btn-secondary {
            background: #1fa868;
            color: white;
            box-shadow: 0 8px 16px #1fa86870;
        }

        .btn-secondary:hover {
            background: #148f54;
            transform: translateY(-3px);
        }

        /* preview */
        .preview-section {
            background: #fefce6;
            border-radius: 24px;
            padding: 22px;
            margin-bottom: 28px;
            border-left: 8px solid #f59e0b;
            box-shadow: 0 15px 25px #00000020;
        }

        .preview-header {
            display: flex;
            gap: 12px;
            align-items: center;
            color: #b45309;
            font-size: 1.3rem;
            margin-bottom: 18px;
        }

        .preview-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        @media (min-width: 640px) {
            .preview-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .preview-card {
            background: white;
            border-radius: 24px;
            padding: 18px;
            box-shadow: 0 5px 12px #d9d9d940;
        }

        .preview-card h4 {
            color: #1f2b47;
            margin-bottom: 12px;
            border-bottom: 1px dashed #ccc;
            padding-bottom: 6px;
        }

        /* search */
        .search-section {
            background: white;
            border-radius: 28px;
            padding: 22px;
            margin-bottom: 25px;
        }

        .search-box {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        @media (min-width: 620px) {
            .search-box {
                flex-direction: row;
                align-items: flex-end;
            }
        }

        .btn-search {
            background: #2667d6;
            color: white;
            padding: 13px 25px;
            border: none;
            border-radius: 34px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 8px 14px #2667d670;
            white-space: nowrap;
        }

        .btn-search:hover {
            background: #1b4fa0;
            transform: scale(1.02);
        }

        /* table */
        .saved-data-section {
            background: white;
            border-radius: 32px;
            padding: 20px 18px;
            box-shadow: 0 20px 40px -5px #00000040;
        }

        .table-container {
            overflow-x: auto;
            border-radius: 22px;
            margin-top: 12px;
            background: #f2f5fa;
            padding: 4px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 650px;
        }

        th {
            background: #28344e;
            color: white;
            padding: 16px 12px;
            font-weight: 550;
            font-size: 0.9rem;
        }

        td {
            padding: 16px 12px;
            border-bottom: 1px solid #cbd5e1;
            background: white;
        }

        .view-btn {
            background: #3f5efb;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 36px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
            box-shadow: 0 5px 10px #3f5efb60;
        }

        .view-btn:hover {
            background: #1f3ed0;
            transform: scale(1.03);
        }

        /* MODERN MODAL - UPDATED FOR SCROLL */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,10,30,0.7);
            backdrop-filter: blur(7px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal-container {
            width: 94%;
            max-width: 860px;
            background: white;
            border-radius: 42px;
            box-shadow: 0 35px 70px #00000070;
            animation: modalPop 0.2s ease;
            max-height: 88vh;  /* Maximum height set */
            display: flex;
            flex-direction: column;
            overflow: hidden;   /* Prevents container overflow */
        }

        @keyframes modalPop {
            from { opacity: 0.5; transform: scale(0.92); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal-header {
            background: #1f2b3f;
            color: white;
            padding: 22px 26px;
            border-radius: 42px 42px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0; /* Prevents header from shrinking */
        }

        .modal-header h2 {
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .modal-close {
            background: rgba(255,255,255,0.18);
            border: none;
            color: white;
            width: 42px;
            height: 42px;
            border-radius: 30px;
            font-size: 1.4rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .modal-close:hover {
            background: #ef4444dd;
        }

        /* MODAL BODY - THIS IS THE SCROLLABLE PART */
        .modal-body {
            padding: 26px 24px;
            overflow-y: auto;    /* Enables vertical scrolling */
            flex-grow: 1;        /* Takes remaining space */
        }

        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px 20px;
        }

        .detail-section {
            background: #f7f9ff;
            border-radius: 26px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .detail-item {
            border-bottom: 1px solid #e0e7f0;
            padding-bottom: 8px;
        }

        .detail-label {
            color: #3f4a67;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .detail-value {
            font-size: 1.2rem;
            font-weight: 550;
            word-break: break-word;
        }

        .modal-footer {
            padding: 20px 26px;
            background: #eef2f9;
            border-radius: 0 0 42px 42px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            flex-shrink: 0; /* Prevents footer from shrinking */
        }

        .modal-btn {
            padding: 14px 30px;
            border-radius: 50px;
            font-weight: 600;
            border: none;
            background: white;
            box-shadow: 0 4px 12px #bfc8da;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .modal-btn-primary {
            background: #1f2b3f;
            color: white;
        }

        /* toast */
        .toast-container {
            position: fixed;
            top: 25px;
            right: 18px;
            z-index: 3000;
        }

        .toast {
            background: white;
            color: #0a1a2f;
            padding: 16px 22px;
            border-radius: 50px;
            box-shadow: 0 18px 35px #00000040;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 12px;
            border-left: 7px solid;
            font-weight: 550;
            min-width: 280px;
            max-width: 380px;
            transform: translateX(400px);
            animation: slideToast 0.25s ease forwards;
        }

        .toast.success { border-left-color: #0fba6d; }
        .toast.error { border-left-color: #f15b5b; }
        .toast.warning { border-left-color: #f5a623; }
        .toast.info { border-left-color: #3f5efb; }

        @keyframes slideToast {
            to { transform: translateX(0); }
        }

        .toast-close {
            margin-left: auto;
            cursor: pointer;
            color: #7b8ca6;
        }

        .spinner {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #3f5efb;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 0.9s linear infinite;
            margin: 25px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- header -->
        <div class="header">
            <h1><i class="fa-solid fa-van-shuttle"></i> Kasun Enterprises</h1>
            <span class="status-badge"><i class="fas fa-circle"></i> Database live</span>
        </div>

        <!-- main grid: seller/buyer (left) + vehicle + actions (right) -->
        <div class="main-grid">
            <!-- LEFT column: seller & buyer -->
            <div>
                <!-- seller -->
                <div class="form-section">
                    <h2 class="section-title"><i class="fas fa-user-tie"></i> Seller details</h2>
                    <div class="form-grid">
                        <div class="form-group"><label><i class="fas fa-user"></i> Full name *</label><input type="text" id="sellerName" placeholder="e.g. John Deo"></div>
                        <div class="form-group"><label><i class="fas fa-map-pin"></i> Address *</label><input type="text" id="sellerAddress" placeholder="Street, city"></div>
                        <div class="form-group"><label><i class="fas fa-phone-alt"></i> Contact *</label><input type="tel" id="sellerContact" placeholder="0777 123456"></div>
                        <div class="form-group"><label><i class="fas fa-id-card"></i> ID number *</label><input type="text" id="sellerId" placeholder="NIC / passport"></div>
                    </div>
                </div>
                <!-- buyer -->
                <div class="form-section">
                    <h2 class="section-title"><i class="fas fa-user-check"></i> Buyer details</h2>
                    <div class="form-grid">
                        <div class="form-group"><label><i class="fas fa-user"></i> Full name *</label><input type="text" id="buyerName" placeholder="e.g. Sara Khan"></div>
                        <div class="form-group"><label><i class="fas fa-map-pin"></i> Address *</label><input type="text" id="buyerAddress" placeholder="Street, city"></div>
                        <div class="form-group"><label><i class="fas fa-phone-alt"></i> Contact *</label><input type="tel" id="buyerContact" placeholder="0766 654321"></div>
                        <div class="form-group"><label><i class="fas fa-id-card"></i> ID number *</label><input type="text" id="buyerId" placeholder="NIC / passport"></div>
                    </div>
                </div>
            </div>

            <!-- RIGHT column: vehicle + action buttons -->
            <div>
                <div class="form-section">
                    <h2 class="section-title"><i class="fas fa-truck-pickup"></i> Vehicle specs</h2>
                    <div class="form-grid">
                        <div class="form-group"><label><i class="fas fa-hashtag"></i> Number *</label><input type="text" id="vehicleNumber" placeholder="WP ABC-1234"></div>
                        <div class="form-group"><label><i class="fas fa-calendar"></i> Year *</label><input type="number" id="vehicleYear" placeholder="2020" min="1900" max="2026"></div>
                    </div>
                    <div class="form-group"><label><i class="fas fa-align-left"></i> Description *</label><textarea id="vehicleDescription" placeholder="Condition, features ..."></textarea></div>
                    <div class="form-grid">
                        <div class="form-group"><label><i class="fas fa-tag"></i> Price *</label><input type="text" id="vehiclePrice" placeholder="Rs. 3,250,000"></div>
                        <div class="form-group"><label><i class="fas fa-palette"></i> Color</label><input type="text" id="vehicleColor" placeholder="White / black"></div>
                        <div class="form-group"><label><i class="fas fa-gas-pump"></i> Fuel</label>
                            <select id="vehicleFuel"><option value="">— select —</option><option>Petrol</option><option>Diesel</option><option>Hybrid</option><option>Electric</option><option>LPG</option></select>
                        </div>
                        <div class="form-group"><label><i class="fas fa-cogs"></i> Transmission</label>
                            <select id="vehicleTransmission"><option value="">— select —</option><option>Automatic</option><option>Manual</option><option>Tiptronic</option></select>
                        </div>
                    </div>
                </div>
                <!-- action buttons -->
                <div class="action-buttons">
                    <button class="btn btn-primary" onclick="saveVehicleData()"><i class="fas fa-save"></i> Save vehicle</button>
                    <button class="btn btn-secondary" onclick="loadAllVehicles()"><i class="fas fa-rotate-right"></i> View All Data</button>
                </div>
            </div>
        </div>

        <!-- preview (hidden by default) -->
        <div class="preview-section" id="previewSection" style="display: none;">
            <div class="preview-header"><i class="fas fa-eye fa-2x"></i> <h3>Last saved preview</h3></div>
            <div class="preview-grid" id="previewContent"></div>
        </div>

        <!-- search row -->
        <div class="search-section">
            <h2 class="section-title"><i class="fas fa-magnifying-glass"></i> Search records</h2>
            <div class="search-box">
                <div class="form-group" style="flex:1;"><label><i class="fas fa-hashtag"></i> Vehicle number</label><input type="text" id="searchVehicleNumber" placeholder="e.g. WP ABC-1234"></div>
                <button class="btn-search" onclick="searchByVehicleNumber()"><i class="fas fa-search"></i> Search</button>
                <button class="btn-search" style="background:#8050d0;" onclick="clearSearch()"><i class="fas fa-eraser"></i> Clear</button>
            </div>
        </div>

        <!-- data table -->
        <div class="saved-data-section">
            <h2 class="section-title"><i class="fas fa-database"></i> Saved Vehicle Records</h2>
            <div class="table-container">
                <table>
                    <thead><tr><th>Reg number</th><th>Seller</th><th>Buyer</th><th>Year</th><th>Price</th><th>Action</th></tr></thead>
                    <tbody id="tableBody">
                        <!-- Initially Empty: Message to load data -->
                        <tr><td colspan="6" style="text-align:center; padding:40px;">
                            <i class="fas fa-database" style="font-size:3rem; opacity:0.4; display:block; margin-bottom:10px;"></i>
                            No data loaded. Click <strong>"View All Data"</strong> to load records.
                        </td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- toast container & modal overlay -->
    <div class="toast-container" id="toastContainer"></div>
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal-container" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2><i class="fas fa-file-invoice"></i> Full details</h2>
                <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Dynamic content will be loaded here. Scroll works! -->
            </div>
            <div class="modal-footer">
                <button class="modal-btn" onclick="closeModal()"><i class="fas fa-chevron-left"></i> Close</button>
                <button class="modal-btn modal-btn-primary" onclick="printDetails()"><i class="fas fa-print"></i> Print</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <script>
        // Firebase Configuration – unchanged
        const firebaseConfig = {
            apiKey: "AIzaSyD25cwNaEvY1b_FZM-lpzlRZu5IIJcKWxE",
            authDomain: "vehicle-5c76b.firebaseapp.com",
            projectId: "vehicle-5c76b",
            storageBucket: "vehicle-5c76b.firebasestorage.app",
            messagingSenderId: "904184209073",
            appId: "1:904184209073:web:e66a9654696c6cd1640c90"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ---------- toast ----------
        function showToast(msg, type = 'info', duration = 3000) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icon = { success:'fa-check-circle', error:'fa-exclamation-circle', warning:'fa-exclamation-triangle', info:'fa-info-circle' }[type] || 'fa-info-circle';
            toast.innerHTML = `<i class="fas ${icon}"></i><span class="toast-message">${msg}</span><span class="toast-close" onclick="this.parentElement.remove()"><i class="fas fa-times"></i></span>`;
            container.appendChild(toast);
            setTimeout(() => { toast.style.animation = 'slideToast 0.2s reverse'; setTimeout(() => toast.remove(), 200); }, duration);
        }

        // modal controls
        function openModal() { document.getElementById('modalOverlay').style.display = 'flex'; document.body.style.overflow = 'hidden'; }
        function closeModal(e) { if (!e || e.target === document.getElementById('modalOverlay')) { document.getElementById('modalOverlay').style.display = 'none'; document.body.style.overflow = 'auto'; } }

        // print modal content
        function printDetails() {
            const content = document.getElementById('modalBody').innerHTML;
            const w = window.open('', '_blank');
            w.document.write(`<html><head><title>Vehicle details</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"><style>body{font-family:'Segoe UI'; padding:2rem;}</style></head><body>${content}</body></html>`);
            w.document.close();
            w.print();
        }

        // view full details (scrollable modal)
        async function viewFullDetails(vehicleId) {
            try {
                const doc = await db.collection('vehicles').doc(vehicleId).get();
                if (!doc.exists) { showToast('not found','error'); return; }
                const d = doc.data();
                const modalBody = document.getElementById('modalBody');
                modalBody.innerHTML = `
                    <div class="detail-section"><h3><i class="fas fa-truck"></i> Vehicle</h3>
                        <div class="detail-grid">
                            <div class="detail-item"><span class="detail-label">Number</span><div class="detail-value">${d.vehicleNumber}</div></div>
                            <div class="detail-item"><span class="detail-label">Year</span><div class="detail-value">${d.vehicleDetails?.year || ''}</div></div>
                            <div class="detail-item"><span class="detail-label">Price</span><div class="detail-value">${d.vehicleDetails?.price}</div></div>
                            <div class="detail-item"><span class="detail-label">Color</span><div class="detail-value">${d.vehicleDetails?.color || '—'}</div></div>
                            <div class="detail-item"><span class="detail-label">Fuel</span><div class="detail-value">${d.vehicleDetails?.fuelType || '—'}</div></div>
                            <div class="detail-item"><span class="detail-label">Transmission</span><div class="detail-value">${d.vehicleDetails?.transmission || '—'}</div></div>
                            <div style="grid-column:span 2"><span class="detail-label">Description</span><div class="detail-value">${d.vehicleDetails?.description}</div></div>
                        </div>
                    </div>
                    <div class="detail-section"><h3><i class="fas fa-user-tie"></i> Seller</h3><div class="detail-grid">
                        <div><span class="detail-label">name</span><div>${d.seller?.name}</div></div>
                        <div><span class="detail-label">address</span><div>${d.seller?.address}</div></div>
                        <div><span class="detail-label">contact</span><div>${d.seller?.contact}</div></div>
                        <div><span class="detail-label">ID</span><div>${d.seller?.id}</div></div>
                    </div></div>
                    <div class="detail-section"><h3><i class="fas fa-user-check"></i> Buyer</h3><div class="detail-grid">
                        <div><span class="detail-label">name</span><div>${d.buyer?.name}</div></div>
                        <div><span class="detail-label">address</span><div>${d.buyer?.address}</div></div>
                        <div><span class="detail-label">contact</span><div>${d.buyer?.contact}</div></div>
                        <div><span class="detail-label">ID</span><div>${d.buyer?.id}</div></div>
                    </div></div>
                `;
                openModal();
                showToast('details ready','success');
            } catch (e) { showToast('error: '+e.message,'error'); }
        }

        // save vehicle
        async function saveVehicleData() {
            const fields = {
                vehicleNumber: document.getElementById('vehicleNumber').value.trim(),
                sellerName: document.getElementById('sellerName').value.trim(),
                sellerAddress: document.getElementById('sellerAddress').value.trim(),
                sellerContact: document.getElementById('sellerContact').value.trim(),
                sellerId: document.getElementById('sellerId').value.trim(),
                buyerName: document.getElementById('buyerName').value.trim(),
                buyerAddress: document.getElementById('buyerAddress').value.trim(),
                buyerContact: document.getElementById('buyerContact').value.trim(),
                buyerId: document.getElementById('buyerId').value.trim(),
                vehicleYear: document.getElementById('vehicleYear').value.trim(),
                vehicleDescription: document.getElementById('vehicleDescription').value.trim(),
                vehiclePrice: document.getElementById('vehiclePrice').value.trim(),
                vehicleColor: document.getElementById('vehicleColor').value.trim(),
                vehicleFuel: document.getElementById('vehicleFuel').value,
                vehicleTransmission: document.getElementById('vehicleTransmission').value
            };
            if (!fields.vehicleNumber || !fields.sellerName || !fields.sellerAddress || !fields.sellerContact || !fields.sellerId || !fields.buyerName || !fields.buyerAddress || !fields.buyerContact || !fields.buyerId || !fields.vehicleYear || !fields.vehicleDescription || !fields.vehiclePrice) {
                showToast('Please fill all * required fields','error'); return;
            }
            try {
                showToast('saving ...','info',1200);
                const vehicleData = {
                    vehicleNumber: fields.vehicleNumber,
                    seller: { name: fields.sellerName, address: fields.sellerAddress, contact: fields.sellerContact, id: fields.sellerId },
                    buyer: { name: fields.buyerName, address: fields.buyerAddress, contact: fields.buyerContact, id: fields.buyerId },
                    vehicleDetails: {
                        year: fields.vehicleYear,
                        description: fields.vehicleDescription,
                        price: fields.vehiclePrice,
                        color: fields.vehicleColor || 'Not specified',
                        fuelType: fields.vehicleFuel || 'Not specified',
                        transmission: fields.vehicleTransmission || 'Not specified'
                    },
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                };
                await db.collection('vehicles').doc(fields.vehicleNumber).set(vehicleData);
                // show preview (temporary)
                document.getElementById('previewContent').innerHTML = `
                    <div class="preview-card"><h4><i class="fas fa-user-tie"></i> Seller</h4>${fields.sellerName}<br>${fields.sellerContact}</div>
                    <div class="preview-card"><h4><i class="fas fa-user-check"></i> Buyer</h4>${fields.buyerName}<br>${fields.buyerContact}</div>
                    <div class="preview-card"><h4><i class="fas fa-car"></i> Vehicle</h4>${fields.vehicleNumber}<br>${fields.vehiclePrice}</div>
                `;
                document.getElementById('previewSection').style.display = 'block';
                setTimeout(() => document.getElementById('previewSection').style.display = 'none', 8000);
                clearForm();
                // After saving, we don't automatically load all. User can click "View All Data" to see.
                showToast('✅ saved. Click View All Data to see all records.','success');
            } catch (err) { showToast('error: '+err.message,'error'); }
        }

        function clearForm() {
            ['sellerName','sellerAddress','sellerContact','sellerId','buyerName','buyerAddress','buyerContact','buyerId','vehicleNumber','vehicleYear','vehicleDescription','vehiclePrice','vehicleColor','vehicleFuel','vehicleTransmission'].forEach(id => document.getElementById(id).value = '');
        }

        // LOAD ALL VEHICLES (called by "View All Data" button)
        async function loadAllVehicles() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '<tr><td colspan="6"><div class="spinner"></div><p style="text-align:center;">fetching all records ...</p></td></tr>';
            try {
                const snap = await db.collection('vehicles').orderBy('createdAt','desc').get();
                if (snap.empty) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:2rem;"><i class="fas fa-database" style="font-size:3rem; opacity:0.3;"></i><br>No records in database</td></tr>';
                    return;
                }
                displayVehicles(snap);  // Display ALL vehicles
                showToast(`loaded ${snap.size} vehicles`,'success');
            } catch (e) { tbody.innerHTML = '<tr><td colspan="6">error</td></tr>'; showToast('load error','error'); }
        }

        // Display vehicles in table (generic)
        function displayVehicles(snapshot) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            snapshot.forEach(doc => {
                const d = doc.data();
                tbody.innerHTML += `<tr>
                    <td><strong>${d.vehicleNumber}</strong></td>
                    <td><i class="fas fa-user"></i> ${d.seller?.name}<br><small>${d.seller?.contact}</small></td>
                    <td><i class="fas fa-user"></i> ${d.buyer?.name}<br><small>${d.buyer?.contact}</small></td>
                    <td>${d.vehicleDetails?.year}</td>
                    <td>${d.vehicleDetails?.price}</td>
                    <td><button class="view-btn" onclick="viewFullDetails('${doc.id}')"><i class="fas fa-eye"></i> view</button></td>
                </tr>`;
            });
        }

        // SEARCH: display only the matching vehicle
        async function searchByVehicleNumber() {
            const num = document.getElementById('searchVehicleNumber').value.trim();
            if (!num) { showToast('enter number','error'); return; }
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '<tr><td colspan="6"><div class="spinner"></div><p style="text-align:center;">searching ...</p></td></tr>';
            try {
                const doc = await db.collection('vehicles').doc(num).get();
                if (!doc.exists) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:2rem;">❌ No vehicle found with that number</td></tr>';
                    showToast('not exist','warning');
                    return;
                }
                // Create a fake snapshot containing only this doc
                const fakeSnapshot = { forEach: (cb) => cb(doc) };
                displayVehicles(fakeSnapshot);   // Shows ONLY the searched vehicle
                showToast('vehicle found','success');
            } catch (e) { showToast('search error','error'); }
        }

        // Clear search: reset input and show ALL data (same as View All)
        function clearSearch() {
            document.getElementById('searchVehicleNumber').value = '';
            loadAllVehicles();   // Now shows all data again
        }

        // escape key
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

        // ON LOAD: Table is empty (just the friendly message). No automatic load.
        window.onload = () => {
            // Table is already empty from HTML. We just show welcome toast.
            showToast('🚀 System Ready. Click "View All Data" to load records.','info',4000);
        };
    </script>
</body>
</html>
